[Bot]
; Base URL for the target site (keep trailing slash if required)
base-url = https://www.tjupt.org/

; Local paths used by the bot. Relative to repository root.
; cookies-path: where cookies/session data will be stored (optional)
cookies-path = data/cookies.pkl

; Authentication: replace placeholders with your credentials.
; IMPORTANT: Do NOT commit real credentials to the repository. Use this
; template to create a personal `config.ini` (which is gitignored).
username = <your-username>
password = <your-password>

; Model / inference API settings (if the project uses model inference)
; Provide your API key and base URL, or leave empty if not used.
model_api_key = <your-model-api-key>
model_base_url = <your-model-base-url>