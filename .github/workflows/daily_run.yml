name: Daily Main.py Run

on:
  schedule:
    - cron: '59 22 * * *'
  workflow_dispatch:

jobs:
  run-main-py:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        pip install requests

    - name: Run main.py
      env:
        MY_USER: ${{ secrets.MY_USER }}
        MY_PASS: ${{ secrets.MY_PASS }}
        MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        # 尝试通过环境变量强制修改脚本内部的模型 ID
        MODEL_ID: "qwen-vl-max"
      run: |
        python main.py -u "$MY_USER" -p "$MY_PASS" --model-api-key "$MODELSCOPE_API_KEY"
